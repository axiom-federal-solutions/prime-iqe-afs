name: BID ENGINE - Price Calculator

# On-demand only — triggered when Mr. Kemp approves a bid
# Run from GitHub Actions UI: pass the opportunity_id as input
on:
  workflow_dispatch:
    inputs:
      opportunity_id:
        description: 'Opportunity UUID from the opportunities table'
        required: true
        type: string

jobs:
  price:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run BID ENGINE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node agents/bidengine.js "${{ github.event.inputs.opportunity_id }}"
