name: BID ENGINE - Price Calculator

# 2026-05-01: rewired so BID ENGINE actually runs without a human clicking.
# JUDGE inserts bids with status='pending_pricing'; this workflow drains that
# queue automatically. Three trigger paths:
#   1. workflow_run after SCOUT - SAM.gov Scanner finishes (catches every JUDGE run)
#   2. Hourly cron as a safety net in case workflow_run misses an event
#   3. Manual workflow_dispatch with optional opportunity_id (single-shot mode)
on:
  workflow_run:
    workflows: ["SCOUT — SAM.gov Scanner"]
    types: [completed]
  schedule:
    # Every 30 minutes — drains the pending_pricing queue.
    # 2026-05-04: bumped from hourly to 30-min cadence because JUDGE now
    # creates bids for CONDITIONAL tier too. With BATCH_LIMIT=30, this
    # gives ~60 bids/hour throughput. Backfill of 500 opps takes ~9 hours.
    - cron: '0,30 * * * *'
  workflow_dispatch:
    inputs:
      opportunity_id:
        description: 'Opportunity UUID — leave blank to drain the pending_pricing queue'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  price:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run BID ENGINE
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # Empty input → batch mode (drains pending_pricing queue).
        # Non-empty input → single-opportunity mode.
        run: node agents/bidengine.js "${{ github.event.inputs.opportunity_id }}"
