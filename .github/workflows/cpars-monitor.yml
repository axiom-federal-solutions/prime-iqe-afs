name: RECON - CPARS Monitor

# Runs every Wednesday at 8 AM UTC (3 AM CT)
# Checks CPARS.gov for new contractor performance evaluations.
# Drafts response templates for below-Satisfactory ratings
# within the 14-day response window.
on:
  schedule:
    - cron: '0 8 * * 3'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  cpars:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run RECON CPARS Monitor
        run: node agents/recon-cpars.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
