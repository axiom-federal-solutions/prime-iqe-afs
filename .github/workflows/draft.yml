name: DRAFT - Proposal Generator

# 2026-05-01: previously workflow_dispatch-only with required bid_id, so Mr.
# Kemp's "approved" bids never got drafted. DRAFT batch mode now polls for
# bids.status='approved' and writes proposals automatically. Human-in-the-
# loop is preserved because DRAFT only fires on the explicit 'approved' flag.
#   1. Twice-daily cron — catches anything Mr. Kemp approved in BRANDI
#   2. Manual workflow_dispatch with optional bid_id (single-shot mode)
on:
  schedule:
    # 9 AM CT (after Mr. Kemp's 6 AM brief gives him time to approve)
    - cron: '0 14 * * *'
    # 4 PM CT — late-day catch-up for afternoon approvals
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      bid_id:
        description: 'Bid UUID — leave blank to drain the approved-bid queue'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Sonnet takes time to write full proposals
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run DRAFT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CAGE_CODE: ${{ secrets.CAGE_CODE }}
          SAM_UEI: ${{ secrets.SAM_UEI }}
        # Empty input → batch mode (drafts every bids.status='approved').
        # Non-empty input → single-bid mode.
        # BUG FIX 2026-05-04: on cron runs github.event.inputs.bid_id is
        # undefined → evaluates to "" → passed as process.argv[2] which is
        # truthy in JS → single-bid mode fires with blank bidId → fails.
        # Shell conditional strips the empty string so cron always gets batch mode.
        run: |
          BID_ID="${{ github.event.inputs.bid_id }}"
          if [ -n "$BID_ID" ]; then
            node agents/draft.js "$BID_ID"
          else
            node agents/draft.js
          fi
