name: EXEC - Certified Payroll

# Runs every Friday at 4 PM UTC (11 AM CT)
# Generates WH-347 certified payroll forms for all
# active Davis-Bacon contracts. Required weekly.
on:
  schedule:
    - cron: '0 16 * * 5'
  workflow_dispatch:

jobs:
  payroll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run EXEC Certified Payroll
        run: node agents/exec-payroll.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
