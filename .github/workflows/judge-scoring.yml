name: JUDGE - Opportunity Scoring

# JUDGE triggers automatically after each SCOUT scan completes.
# Also can be run manually from the GitHub Actions UI.
# 2026-05-01 BUG FIX: workflow_run name was "SCOUT - SAM.gov Scan" (regular
# hyphen + "Scan") but the actual workflow is named "SCOUT — SAM.gov Scanner"
# (em dash + "Scanner"). GitHub Actions requires exact-string match, so this
# auto-trigger was silently dead — JUDGE only ran because scout-sam.yml
# inlines a JUDGE step. Now it fires on both paths.
on:
  workflow_run:
    workflows: ["SCOUT — SAM.gov Scanner"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run JUDGE
        run: node agents/judge.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # After JUDGE scores, immediately match suppliers to newly scored opportunities
      # Uses --match-only to skip the full SAM scan (runs weekly separately)
      - name: Match suppliers to newly scored opportunities
        run: node agents/recon-suppliers.js --match-only
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
