name: LEDGER - Monthly Report

# Runs on the 1st of each month at 6 AM UTC (1 AM CT)
# Generates monthly performance report: win rates,
# scoring accuracy, cost variance trends, concentration risk.
on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run LEDGER Monthly Report
        run: node agents/ledger-monthly.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
