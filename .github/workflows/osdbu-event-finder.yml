name: RECON - OSDBU Events

# Runs every Monday at 9 AM UTC (4 AM CT)
# Scrapes 8 agency OSDBU pages for matchmaking events.
# Creates calendar entries with registration links.
# Generates agency-tailored talking points and capability
# statements for each event found.
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  events:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run RECON OSDBU Event Finder
        run: node agents/recon-osdbu.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
