name: EXEC - Prompt Payment Check

# Runs daily at 7 AM UTC (2 AM CT)
# Checks all invoices for late government payments.
# Calculates Prompt Payment Act interest owed (FAR 52.232-25).
# Drafts claim letters and queues in Brandi's brief.
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run EXEC Prompt Payment Check
        run: node agents/exec-prompt-payment.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
