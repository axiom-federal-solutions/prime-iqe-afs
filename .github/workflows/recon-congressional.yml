name: RECON - Congressional Intel

# Runs every Monday at 8 AM UTC (3 AM CT)
# Scans Congress.gov for appropriations bills affecting
# construction and supply budgets. 12-18 month early warning.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  congress:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run RECON Congressional Intel
        run: node agents/recon-congress.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
