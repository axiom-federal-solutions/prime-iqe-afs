# =============================================================
# RECON-SUPPLIER-SCAN.YML — Supplier Intelligence Workflow
# JOB: Scan SAM Entity API for subcontractors + teaming partners,
#      enrich with SBA certifications and USAspending contract history,
#      then match suppliers to all recently scored opportunities
# SCHEDULE: Weekly Monday 03:00 CT (= 09:00 UTC)
# COST: +$0.50/month (Haiku specialty inference, minimal usage)
# =============================================================

name: RECON Supplier Scan

on:
  # Weekly Monday at 03:00 CT = 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'

  # Also run after JUDGE scores new opportunities (matching only)
  # 2026-05-02 BUG FIX: was listening for "JUDGE Scoring" but the actual
  # workflow name is "JUDGE - Opportunity Scoring". Auto-trigger never fired.
  workflow_run:
    workflows:
      - "JUDGE - Opportunity Scoring"
    types:
      - completed

  # Manual trigger — useful after adding new properties/equipment to the system
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: full (scan + enrich + match) or match_only'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - match_only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  supplier-scan:
    name: Scan and Match Suppliers
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Full scan with enrichment can take up to 25 minutes

    steps:
      # 1. Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Full scan (SAM entity pull + USAspending enrichment + matching)
      #    --match-only flag skips the SAM scan when triggered by JUDGE workflow_run
      - name: Run supplier scan and matching
        run: |
          if [ "${{ github.event.inputs.mode }}" = "match_only" ] || [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Mode: match-only (triggered by JUDGE or manual match_only selection)"
            node agents/recon-suppliers.js --match-only
          else
            echo "Mode: full scan"
            node agents/recon-suppliers.js
          fi
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:      ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_API_KEY:               ${{ secrets.SAM_API_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Log completion
        if: always()
        run: echo "Supplier scan complete at $(date -u '+%Y-%m-%d %H:%M UTC')"
