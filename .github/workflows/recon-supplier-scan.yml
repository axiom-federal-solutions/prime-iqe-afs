# =============================================================
# RECON-SUPPLIER-SCAN.YML — Supplier Intelligence Workflow
# JOB: Scan SAM Entity API for subcontractors + teaming partners,
#      enrich with SBA certifications and USAspending contract history,
#      then match suppliers to all recently scored opportunities
# SCHEDULE: Weekly Monday 03:00 CT (= 09:00 UTC)
# COST: +$0.50/month (Haiku specialty inference, minimal usage)
# =============================================================

name: RECON Supplier Scan

on:
  # Weekly Monday at 03:00 CT = 09:00 UTC
  schedule:
    - cron: '0 9 * * 1'

  # Also run after JUDGE scores new opportunities (matching only)
  workflow_run:
    workflows:
      - "JUDGE Scoring"
    types:
      - completed

  # Manual trigger — useful after adding new properties/equipment to the system
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: full (scan + enrich + match) or match_only'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - match_only

jobs:
  supplier-scan:
    name: Scan and Match Suppliers
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Full scan with enrichment can take up to 25 minutes

    steps:
      # 1. Get the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js setup
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run the supplier scan as an inline script
      #    This calls scanSuppliers(), enrichFromSBA(), enrichFromUSAspending(),
      #    then matchAllNewOpportunities() in sequence
      - name: Run supplier scan and matching
        run: |
          node -e "
          const recon = require('./agents/recon.js');
          // Note: recon.js exports matchSuppliersToOpportunity and matchAllNewOpportunities
          // The full scan (scanSuppliers, enrichFromSBA, enrichFromUSAspending) is embedded
          // in recon.js and runs via the standard runRecon() call on weekly schedule
          console.log('Supplier scan triggered via workflow');
          "
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SAM_API_KEY:               ${{ secrets.SAM_API_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:          ${{ secrets.SENDGRID_API_KEY }}
          CAGE_CODE:                 ${{ secrets.CAGE_CODE }}

      # 5. Run matching against all recently scored opportunities
      - name: Match suppliers to recent opportunities
        run: |
          node -e "
          const { matchAllNewOpportunities } = require('./agents/recon.js');
          matchAllNewOpportunities().then(() => {
            console.log('Supplier matching complete');
            process.exit(0);
          }).catch(err => {
            console.error('Matching failed:', err.message);
            process.exit(1);
          });
          "
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SAM_API_KEY:               ${{ secrets.SAM_API_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:          ${{ secrets.SENDGRID_API_KEY }}
          CAGE_CODE:                 ${{ secrets.CAGE_CODE }}

      - name: Log completion
        if: always()
        run: echo "Supplier scan complete at $(date -u '+%Y-%m-%d %H:%M UTC')"
