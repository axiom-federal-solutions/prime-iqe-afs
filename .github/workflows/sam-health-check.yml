name: VAULT - SAM Health Check

# Runs on the 1st of each month at 5 AM UTC (12 AM CT)
# Validates SAM.gov registration: status, NAICS alignment,
# expiry countdown, address accuracy, banking accuracy.
# Flags any issues to Brandi's brief.
on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run VAULT SAM Health Check
        run: node agents/vault-sam-health.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
