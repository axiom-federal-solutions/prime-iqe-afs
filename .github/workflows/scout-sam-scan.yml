name: SCOUT - SAM.gov Scan
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5,11,17,23 * * *'
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Debug SAM.gov API key info
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: |
          echo "SAM_API_KEY length: ${#SAM_API_KEY}"
          echo "SAM_API_KEY first 4 chars: ${SAM_API_KEY:0:4}"
          echo "=== Testing prod endpoint ==="
          curl -si --max-time 10 "https://api.sam.gov/" | head -10 || echo "prod curl error"
          echo "=== Testing alpha endpoint ==="
          curl -si --max-time 10 "https://api-alpha.sam.gov/" | head -10 || echo "alpha curl error"
      echo "=== Testing sam-proxy directly ==="
      curl -s -X POST "https://lsgaifejjoxqudjhkeev.supabase.co/functions/v1/sam-proxy" \
        -H "Content-Type: application/json" \
        -d "{\"naicsCode\": \"541511\", \"postedFrom\": \"03/27/2026\", \"apiKey\": \"$SAM_API_KEY\"}" \
        | python3 -c "import sys,json; d=json.load(sys.stdin); print('samStatus:', d.get('samStatus')); b=d.get('samBody',''); data=json.loads(b) if b else {}; print('totalRecords:', data.get('totalRecords')); print('body_preview:', b[:300])" || echo "proxy parse error"
      - name: Run SCOUT
        env:
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_UEI: ${{ secrets.SAM_UEI }}
        run: node agents/scout.js
      - name: Run JUDGE
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node agents/judge.js
