name: SCOUT - State Portal Scan

# Runs daily at 4 AM UTC (11 PM CT prior night)
# Scans state procurement portals: LaPAC, MyFlorida,
# GeorgiaFirst, TX DIR, VA eVA. Captures state/local
# opportunities not on SAM.gov.
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run SCOUT State Portal Scan
        run: node agents/scout-state.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
