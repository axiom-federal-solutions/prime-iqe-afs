# =============================================================
# SMOKE-TEST-ALL — Run every PRIME agent once, report pass/fail
# JOB: Single workflow_dispatch that exercises every agent end-to-end
#      against the canonical Supabase project. Use after a major change
#      (project move, schema migration, code refactor) to confirm
#      nothing is broken.
# COST: ~$1–$2 in Anthropic API for the Claude-using agents.
# DURATION: ~15–25 minutes.
# SAFETY: continue-on-error: true on every step so one failure does not
#         stop the rest. BRANDI runs in 'alert' mode only — no daily
#         brief email sent. EXEC, DRAFT, BIDENGINE will no-op gracefully
#         if no contracts/bids exist yet.
# =============================================================

name: Smoke-test all agents

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this? (logged for posterity)'
        required: false
        default: 'Periodic smoke test'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  smoke:
    name: Run every agent once
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Install dependencies
        run: npm install

      # ── STEP 0: Hard auth probe — fail fast if Supabase is wrong ──
      - name: 0. Auth probe (POST to agent_logs)
        id: auth
        run: |
          echo "URL: ${SUPABASE_URL:0:50}"
          echo "KEY length: ${#SUPABASE_SERVICE_KEY}"
          BODY='{"agent":"SMOKE_TEST","action":"auth probe","metadata":{"run":"'"$GITHUB_RUN_ID"'"}}'
          STATUS=$(curl -s -o /tmp/r.txt -w "%{http_code}" \
            -X POST "$SUPABASE_URL/rest/v1/agent_logs" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY")
          echo "HTTP: $STATUS"
          cat /tmp/r.txt
          if [ "$STATUS" != "201" ] && [ "$STATUS" != "204" ]; then
            echo "FATAL: service-role auth failed against canonical project"
            exit 1
          fi
          echo "auth=ok" >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ── SCOUT family ─────────────────────────────────────────────
      - name: 1. SCOUT — SAM.gov scanner
        id: s1
        if: always()
        continue-on-error: true
        run: node agents/scout.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_API_KEY:          ${{ secrets.SAM_API_KEY }}
          CAGE_CODE:            ${{ secrets.CAGE_CODE }}

      - name: 2. SCOUT-state — state-portal scanner
        id: s2
        if: always()
        continue-on-error: true
        run: node agents/scout-state.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ── JUDGE — score new opportunities ─────────────────────────
      - name: 3. JUDGE — score unscored opportunities
        id: s3
        if: always()
        continue-on-error: true
        run: node agents/judge.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      # ── BRANDI alert mode (no daily email — this is just smoke) ──
      - name: 4. BRANDI — STRONG BID alert check
        id: s4
        if: always()
        continue-on-error: true
        run: node agents/brandi.js alert
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SENDGRID_API_KEY:     ${{ secrets.SENDGRID_API_KEY }}
          FROM_EMAIL:           ${{ secrets.FROM_EMAIL }}
          FROM_NAME:            ${{ secrets.FROM_NAME }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      # ── RECON family ────────────────────────────────────────────
      - name: 5. RECON — incumbent + intel scan
        id: s5
        if: always()
        continue-on-error: true
        run: node agents/recon.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 6. RECON suppliers — match-only mode (no SAM scan)
        id: s6
        if: always()
        continue-on-error: true
        run: node agents/recon-suppliers.js --match-only
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 7. RECON CPARS — fetch ratings
        id: s7
        if: always()
        continue-on-error: true
        run: node agents/recon-cpars.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 8. RECON GAO — protest scan
        id: s8
        if: always()
        continue-on-error: true
        run: node agents/recon-gao.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 9. RECON OSDBU — event finder
        id: s9
        if: always()
        continue-on-error: true
        run: node agents/recon-osdbu.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 10. RECON congress — congressional intel
        id: s10
        if: always()
        continue-on-error: true
        run: node agents/recon-congress.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ── VAULT family ────────────────────────────────────────────
      - name: 11. VAULT — bid bond + compliance gating
        id: s11
        if: always()
        continue-on-error: true
        run: node agents/vault.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CAGE_CODE:            ${{ secrets.CAGE_CODE }}
          BONDING_COMPANY:      ${{ secrets.BONDING_COMPANY }}

      - name: 12. VAULT SAM-health — registration expiry check
        id: s12
        if: always()
        continue-on-error: true
        run: node agents/vault-sam-health.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_API_KEY:          ${{ secrets.SAM_API_KEY }}

      # ── EXEC family (no-ops gracefully if no contracts) ─────────
      - name: 13. EXEC daily — orchestrator
        id: s13
        if: always()
        continue-on-error: true
        run: node agents/exec.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 14. EXEC payroll — certified payroll generator
        id: s14
        if: always()
        continue-on-error: true
        run: node agents/exec-payroll.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 15. EXEC costs — QuickBooks sync (skipped if no QB secrets)
        id: s15
        if: always()
        continue-on-error: true
        run: node agents/exec-costs.js
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:       ${{ secrets.SUPABASE_SERVICE_KEY }}
          QUICKBOOKS_CLIENT_ID:       ${{ secrets.QUICKBOOKS_CLIENT_ID }}
          QUICKBOOKS_CLIENT_SECRET:   ${{ secrets.QUICKBOOKS_CLIENT_SECRET }}
          QUICKBOOKS_REFRESH_TOKEN:   ${{ secrets.QUICKBOOKS_REFRESH_TOKEN }}

      - name: 16. EXEC retainage — release-monitor
        id: s16
        if: always()
        continue-on-error: true
        run: node agents/exec-retainage.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: 17. EXEC prompt-payment — claim filer
        id: s17
        if: always()
        continue-on-error: true
        run: node agents/exec-prompt-payment.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      # ── BIDENGINE & DRAFT (no-op gracefully if no bids in pending) ─
      - name: 18. BIDENGINE — pricing
        id: s18
        if: always()
        continue-on-error: true
        run: node agents/bidengine.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 19. DRAFT — proposal drafter
        id: s19
        if: always()
        continue-on-error: true
        run: node agents/draft.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          CAGE_CODE:            ${{ secrets.CAGE_CODE }}
          SAM_UEI:              ${{ secrets.SAM_UEI }}

      # ── LEDGER family ────────────────────────────────────────────
      - name: 20. LEDGER weekly — pipeline summary
        id: s20
        if: always()
        continue-on-error: true
        run: node agents/ledger.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}

      - name: 21. LEDGER monthly — Monte Carlo + ML retrain
        id: s21
        if: always()
        continue-on-error: true
        run: node agents/ledger-monthly.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY:     ${{ secrets.SENDGRID_API_KEY }}

      # ── TEST suite ──────────────────────────────────────────────
      - name: 22. TEST — internal validation suite
        id: s22
        if: always()
        continue-on-error: true
        run: node agents/test.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_API_KEY:          ${{ secrets.SAM_API_KEY }}

      # ── Final summary ───────────────────────────────────────────
      - name: SUMMARY
        if: always()
        run: |
          {
            echo "## PRIME smoke-test results"
            echo ""
            echo "Reason: ${{ inputs.reason }}"
            echo "Run: $GITHUB_RUN_ID"
            echo ""
            echo "| # | Agent | Result |"
            echo "|---|---|---|"
            echo "| 0  | Auth probe                       | ${{ steps.auth.outcome }} |"
            echo "| 1  | SCOUT (SAM.gov)                  | ${{ steps.s1.outcome }} |"
            echo "| 2  | SCOUT-state (state portals)      | ${{ steps.s2.outcome }} |"
            echo "| 3  | JUDGE (scoring)                  | ${{ steps.s3.outcome }} |"
            echo "| 4  | BRANDI (alert mode)              | ${{ steps.s4.outcome }} |"
            echo "| 5  | RECON (intel)                    | ${{ steps.s5.outcome }} |"
            echo "| 6  | RECON suppliers (--match-only)   | ${{ steps.s6.outcome }} |"
            echo "| 7  | RECON CPARS                      | ${{ steps.s7.outcome }} |"
            echo "| 8  | RECON GAO                        | ${{ steps.s8.outcome }} |"
            echo "| 9  | RECON OSDBU                      | ${{ steps.s9.outcome }} |"
            echo "| 10 | RECON congress                   | ${{ steps.s10.outcome }} |"
            echo "| 11 | VAULT                            | ${{ steps.s11.outcome }} |"
            echo "| 12 | VAULT SAM-health                 | ${{ steps.s12.outcome }} |"
            echo "| 13 | EXEC daily                       | ${{ steps.s13.outcome }} |"
            echo "| 14 | EXEC payroll                     | ${{ steps.s14.outcome }} |"
            echo "| 15 | EXEC costs (QB sync)             | ${{ steps.s15.outcome }} |"
            echo "| 16 | EXEC retainage                   | ${{ steps.s16.outcome }} |"
            echo "| 17 | EXEC prompt-payment              | ${{ steps.s17.outcome }} |"
            echo "| 18 | BIDENGINE                        | ${{ steps.s18.outcome }} |"
            echo "| 19 | DRAFT                            | ${{ steps.s19.outcome }} |"
            echo "| 20 | LEDGER weekly                    | ${{ steps.s20.outcome }} |"
            echo "| 21 | LEDGER monthly                   | ${{ steps.s21.outcome }} |"
            echo "| 22 | TEST suite                       | ${{ steps.s22.outcome }} |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      # Also write a single audit row to agent_logs so the dashboard
      # shows when this smoke test ran and which steps passed
      - name: Log result to agent_logs
        if: always()
        run: |
          PASS_COUNT=$(echo "${{ steps.auth.outcome }} ${{ steps.s1.outcome }} ${{ steps.s2.outcome }} ${{ steps.s3.outcome }} ${{ steps.s4.outcome }} ${{ steps.s5.outcome }} ${{ steps.s6.outcome }} ${{ steps.s7.outcome }} ${{ steps.s8.outcome }} ${{ steps.s9.outcome }} ${{ steps.s10.outcome }} ${{ steps.s11.outcome }} ${{ steps.s12.outcome }} ${{ steps.s13.outcome }} ${{ steps.s14.outcome }} ${{ steps.s15.outcome }} ${{ steps.s16.outcome }} ${{ steps.s17.outcome }} ${{ steps.s18.outcome }} ${{ steps.s19.outcome }} ${{ steps.s20.outcome }} ${{ steps.s21.outcome }} ${{ steps.s22.outcome }}" | tr ' ' '\n' | grep -c '^success$' || true)
          BODY=$(printf '{"agent":"SMOKE_TEST","action":"All-agents smoke test complete","metadata":{"pass_count":%s,"total":23,"run_id":"%s","reason":"%s"}}' "$PASS_COUNT" "$GITHUB_RUN_ID" "${{ inputs.reason }}")
          curl -s -o /dev/null -X POST "$SUPABASE_URL/rest/v1/agent_logs" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "$BODY" || true
          echo "Logged: $PASS_COUNT / 23 passed"
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
