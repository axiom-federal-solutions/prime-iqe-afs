# =============================================================
# TEST-VALIDATION.YML — T.E.S.T. v2 Workflow
# JOB: Run all 30+ validation tests across 7 categories
# SCHEDULE: Daily 04:00 CT (10:00 UTC) — before all other agents
# TRIGGERS: Also after JUDGE, EXEC, and BRANDI complete
# COST: $0/month (zero LLM calls — pure logic)
# =============================================================

name: TEST - System Validation

on:
  schedule:
    # Daily at 04:00 CT = 10:00 UTC
    - cron: '0 10 * * *'

  # Also trigger after key agents complete their work
  workflow_run:
    workflows:
      - "JUDGE - Opportunity Scoring"
      - "EXEC - Prompt Payment Check"
      - "EXEC - Cost Sync"
      - "BRANDI - Morning Brief"
    types: [completed]

  # Manual trigger for testing
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Run T.E.S.T. Validation Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run T.E.S.T. validation
        run: node agents/test.js
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SAM_API_KEY:          ${{ secrets.SAM_API_KEY }}

      - name: Log completion
        if: always()
        run: echo "T.E.S.T. validation complete at $(date -u '+%Y-%m-%d %H:%M UTC')"
