<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IQE PRIME v16 — Axiom Federal Solutions</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080F;--panel:#0B0F1A;--card:#0F1424;--cardHi:#131B30;--bd:rgba(255,255,255,.06);--t1:#EDF0F7;--t2:#8B95AB;--t3:#4D5669;--gold:#E9C46A;--goldDim:rgba(233,196,106,.12);--goldBd:rgba(233,196,106,.25);--cyan:#00E5FF;--cyanDim:rgba(0,229,255,.10);--cyanBd:rgba(0,229,255,.25);--green:#34D399;--greenDim:rgba(52,211,153,.10);--greenBd:rgba(52,211,153,.25);--red:#F87171;--redDim:rgba(248,113,113,.10);--amber:#F59E0B;--amberDim:rgba(245,158,11,.10);--violet:#A78BFA;--violetDim:rgba(167,139,250,.10);--rose:#FB7185;--roseDim:rgba(251,113,133,.10);--steel:#64748B}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
.ambient{position:fixed;inset:0;pointer-events:none;background:radial-gradient(900px 500px at 70% -10%,var(--cyanDim),transparent 60%),radial-gradient(700px 400px at 10% 110%,var(--goldDim),transparent 60%);z-index:0}
.sb{width:224px;background:rgba(8,11,20,.85);backdrop-filter:blur(12px);border-right:1px solid var(--bd);padding:16px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex-shrink:0;z-index:1}
.sb-logo{padding:8px 12px 20px;display:flex;align-items:center;gap:10px}
.sb-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#8B6914);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff}
.sb-title{font-weight:800;font-size:15px}.sb-title span{color:var(--gold)}
.sb-ver{font-size:8px;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
.sb-group{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.16em;padding:12px 12px 4px;text-transform:uppercase}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--t2);font-size:12px;font-family:'Outfit',sans-serif;font-weight:400;text-align:left;transition:all .15s}
.sb-btn:hover{background:rgba(255,255,255,.03)}.sb-btn.active{background:var(--cyanDim);color:var(--cyan);font-weight:600}
.sb-dot{width:6px;height:6px;border-radius:99px;margin-left:auto}
.sb-foot{margin-top:auto;padding:16px 12px 8px;font-size:9px;color:var(--t3);line-height:1.6;border-top:1px solid var(--bd)}
.main{flex:1;overflow-y:auto;padding:20px 24px 40px;z-index:1}.tab{display:none}.tab.active{display:block}
.badge{font-size:9px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:4px;text-transform:uppercase;white-space:nowrap;display:inline-block}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap}
.kpi{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;flex:1;min-width:120px}
.kpi-val{font-size:22px;font-weight:800}.kpi-lbl{font-size:10px;color:var(--t2);margin-top:2px}.kpi-sub{font-size:9px;color:var(--t3);margin-top:3px}
.opp{display:grid;grid-template-columns:minmax(0,1fr) 70px 80px 110px 65px;gap:8px;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;transition:border-color .15s;cursor:pointer;margin-bottom:6px}.opp:hover{border-color:var(--cyan)}
.feed{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;max-height:440px;overflow-y:auto}
.feed-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)}.feed-item:last-child{border-bottom:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card-section{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:16px}
.bar{height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:6px}.bar-fill{height:100%;border-radius:99px}
.alert{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;margin-bottom:6px}
.pill{padding:6px 12px;border-radius:6px;font-size:10px;font-weight:600;display:inline-block}
.bid-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
.comp-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:6px}
.comp-dot{width:8px;height:8px;border-radius:99px;flex-shrink:0}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:3px}
.stile{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:5px;padding:6px 5px;cursor:pointer;text-align:center;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:border-color .15s;position:relative}
.stile:hover{border-color:var(--goldBd);background:var(--cardHi)}.stile.hot{border-color:rgba(52,211,153,.55)}.stile.dim{opacity:.35}
.stile .hpb{position:absolute;top:2px;right:2px;font-size:5px;font-weight:900;padding:1px 3px;border-radius:1px}
.reg-lbl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:6px 2px 2px;border-top:1px solid var(--bd);margin-top:4px}
.state-detail{background:var(--card);border:1px solid var(--goldBd);border-radius:8px;padding:16px;margin-top:12px}
.cong-item{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:8px;border-left:3px solid var(--amber)}
.cong-impact{margin-top:8px;padding:10px 12px;border-radius:6px;font-size:11px;line-height:1.5}
.co-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.agent-card{background:var(--card);border-radius:8px;padding:12px 14px}
.money-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:16px;margin-bottom:10px}
.money-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.help-item{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.help-item:hover{border-color:var(--cyanBd)}
.help-q{font-size:12px;font-weight:600;margin-bottom:6px}.help-a{font-size:11px;color:var(--t2);line-height:1.6;display:none}
.help-item.open .help-a{display:block}.help-item.open{border-color:var(--goldBd)}
.help-search{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--card);color:var(--t1);font-family:'Outfit',sans-serif;font-size:13px;outline:none;margin-bottom:16px}
.help-search:focus{border-color:var(--cyanBd)}
.help-cat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600;margin-right:6px}
.growth-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-bottom:8px}
.growth-status{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700}
.sup-match{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--cardHi);border-radius:5px;margin-bottom:4px}
/* Detail panel */
.det-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:none;backdrop-filter:blur(2px)}
.det-ov.open{display:block}
.det-pan{position:fixed;right:0;top:0;height:100vh;width:480px;max-width:92vw;background:var(--panel);border-left:1px solid var(--goldBd);z-index:101;overflow-y:auto;padding:28px 24px;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.det-pan.open{transform:translateX(0)}
.det-close{position:sticky;top:0;float:right;background:var(--card);border:1px solid var(--bd);border-radius:6px;color:var(--t2);font-size:16px;line-height:1;padding:4px 8px;cursor:pointer;margin-bottom:12px}
.det-close:hover{color:var(--t1)}
/* Refresh */
.refresh-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--cyanBd);background:transparent;color:var(--cyan);font-family:'Outfit',sans-serif;font-size:10px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.refresh-btn:hover{background:var(--cyanDim)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .8s linear infinite;display:inline-block}
/* Empty state */
.empty{text-align:center;padding:50px 20px;color:var(--t3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:600;color:var(--t2);margin-bottom:8px}
.empty-body{font-size:11px;line-height:1.7}
.run-link{display:inline-block;margin-top:14px;padding:8px 18px;border-radius:6px;background:var(--cyanDim);border:1px solid var(--cyanBd);color:var(--cyan);font-size:11px;font-weight:600;text-decoration:none}
/* Loading pulse */
.loading-row{background:var(--card);border-radius:8px;padding:14px;margin-bottom:6px;opacity:.5;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.65}}
@media(max-width:900px){.sb{display:none}.main{padding:12px}.sgrid{grid-template-columns:repeat(auto-fill,minmax(52px,1fr))}}
</style>
</head>
<body>
<div class="ambient"></div>

<!-- Detail overlay + panel -->
<div class="det-ov" id="det-ov" onclick="closeDetail()"></div>
<div class="det-pan" id="det-pan">
  <button class="det-close" onclick="closeDetail()">✕</button>
  <div id="det-content"></div>
</div>

<nav class="sb">
  <div class="sb-logo"><div class="sb-mark">P</div><div><div class="sb-title">IQE <span>PRIME</span></div><div class="sb-ver">v16 · 3 Verticals</div></div></div>
  <div class="sb-group">Command</div><button class="sb-btn active" onclick="go('home',this)">🏠 Command Center</button>
  <div class="sb-group">Find Work</div>
  <button class="sb-btn" onclick="go('construction',this)">🏗️ Construction<span class="sb-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span></button>
  <button class="sb-btn" onclick="go('supply',this)">📦 Supply<span class="sb-dot" style="background:var(--cyan);box-shadow:0 0 6px var(--cyan)"></span></button>
  <button class="sb-btn" onclick="go('realestate',this)">🏢 Real Estate & Rental<span class="sb-dot" style="background:var(--rose);box-shadow:0 0 6px var(--rose)"></span></button>
  <div class="sb-group">Win Work</div><button class="sb-btn" onclick="go('bids',this)">📋 My Bids</button>
  <div class="sb-group">Execute</div><button class="sb-btn" onclick="go('active',this)">📊 Active Projects</button>
  <div class="sb-group">Revenue</div><button class="sb-btn" onclick="go('money',this)">💰 Money Recovery<span class="sb-dot" style="background:var(--green);box-shadow:0 0 6px var(--green)"></span></button>
  <div class="sb-group">Compliance</div><button class="sb-btn" onclick="go('compliance',this)">🛡️ Certs · Bonds · Safety</button>
  <div class="sb-group">Intelligence</div><button class="sb-btn" onclick="go('intel',this)">🏛️ Market Intel & Congress</button>
  <div class="sb-group">System</div>
  <button class="sb-btn" onclick="go('system',this)">⚙️ Agents & Config</button>
  <button class="sb-btn" onclick="go('help',this)">❓ Help & FAQ</button>
  <div class="sb-foot">Built by Noble Erne, LLC<br>Axiom Federal Solutions<br>~$9.50/mo · 32 NAICS · 19 workflows<br>30 tables · T.E.S.T. v2 Active<br><span id="last-load" style="color:var(--t3)">Loading…</span></div>
</nav>

<div class="main" id="mc">
  <div id="t-home" class="tab active"></div>
  <div id="t-construction" class="tab" style="display:none"></div>
  <div id="t-supply" class="tab" style="display:none"></div>
  <div id="t-realestate" class="tab" style="display:none"></div>
  <div id="t-bids" class="tab" style="display:none"></div>
  <div id="t-active" class="tab" style="display:none"></div>
  <div id="t-money" class="tab" style="display:none"></div>
  <div id="t-compliance" class="tab" style="display:none"></div>
  <div id="t-intel" class="tab" style="display:none"></div>
  <div id="t-system" class="tab" style="display:none"></div>
  <div id="t-help" class="tab" style="display:none"></div>
</div>

<script>
// ─── SUPABASE ───────────────────────────────────────────────────────
const { createClient } = window.supabase;
const sb = createClient(
  'https://lsgaifejjoxqudjhkeev.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZ2FpZmVqam94cXVkamhrZWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxNjg1MDIsImV4cCI6MjA5Mjc0NDUwMn0.Ptwds-uLLkPNd9nQv-g3ADxz-quX8iU7JwYiSqp7GJ8'
);

// ─── STATE ──────────────────────────────────────────────────────────
let OPPS=[], BIDS=[], SUPS=[], RUNS=[], loading=false;
const GH_ACTIONS='https://github.com/axiom-federal-solutions/prime-iqe-afs/actions';

// ─── HELPERS ────────────────────────────────────────────────────────
function sc(s){return s>=85?'var(--green)':s>=70?'var(--gold)':s>=55?'var(--amber)':'var(--red)';}
function rb(r){const m={'STRONG BID':{bg:'var(--greenDim)',c:'var(--green)',i:'✅'},'BID':{bg:'var(--cyanDim)',c:'var(--cyan)',i:'✅'},'CONDITIONAL':{bg:'var(--amberDim)',c:'var(--amber)',i:'⚠️'},'NO BID':{bg:'var(--redDim)',c:'var(--red)',i:'❌'},'STRONG LEASE':{bg:'var(--greenDim)',c:'var(--green)',i:'🏢'},'LEASE':{bg:'var(--roseDim)',c:'var(--rose)',i:'🏢'}};const s=m[r]||m['BID'];return '<span class="badge" style="background:'+s.bg+';color:'+s.c+'">'+s.i+' '+r+'</span>';}
function fmt(v){if(!v)return '—';return v>=1e6?'$'+(v/1e6).toFixed(1)+'M':v>=1000?'$'+(v/1000).toFixed(0)+'K':'$'+v;}
function daysLeft(deadline){if(!deadline)return null;const d=Math.ceil((new Date(deadline)-new Date())/86400000);return Math.max(0,d);}
function scoreOf(o){return o.vertical==='supply'?o.acq_score:o.vertical==='realestate'?o.lease_score:(o.prime_score||o.acq_score||o.lease_score)||0;}
function slOf(o){return o.vertical==='supply'?'ACQ':o.vertical==='realestate'?'LEASE':'PRIME';}
function vtColor(v){return v==='supply'?'var(--cyan)':v==='realestate'?'var(--rose)':'var(--green)';}
function vtLabel(v){return v==='supply'?'SUPPLY':v==='realestate'?'RE&R':'CONSTR';}
function emptyState(msg,sub){return `<div class="empty"><div class="empty-icon">📡</div><div class="empty-title">${msg}</div><div class="empty-body">${sub}</div><a class="run-link" href="${GH_ACTIONS}" target="_blank">▶ Open GitHub Actions to Run SCOUT</a></div>`;}
function loadingRows(n=3){return Array(n).fill('<div class="loading-row" style="height:56px"></div>').join('');}

// ─── DATA LOAD ──────────────────────────────────────────────────────
async function loadData(manual=false){
  if(loading)return;
  loading=true;
  const icon=document.getElementById('ri');
  if(icon)icon.classList.add('spinning');

  try{
    const [o,b,s,r]=await Promise.all([
      sb.from('opportunities').select('*').order('prime_score',{ascending:false}).limit(200),
      sb.from('bids').select('*').order('created_at',{ascending:false}).limit(50),
      sb.from('supplier_matches').select('*').order('match_score',{ascending:false}).limit(50),
      sb.from('agent_runs').select('*').order('created_at',{ascending:false}).limit(20)
    ]);
    OPPS=o.data||[];
    BIDS=b.data||[];
    SUPS=s.data||[];
    RUNS=r.data||[];

    const ll=document.getElementById('last-load');
    if(ll){const n=new Date();ll.textContent='Updated '+n.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}

    renderAll();
  }catch(e){
    console.error('Supabase load failed:',e);
    const ll=document.getElementById('last-load');
    if(ll)ll.textContent='⚠ Load error';
  }finally{
    loading=false;
    if(icon)icon.classList.remove('spinning');
  }
}

// ─── NAVIGATION ─────────────────────────────────────────────────────
const TABS=['home','construction','supply','realestate','bids','active','money','compliance','intel','system','help'];
let activeTab='home';
function go(id,btn){
  TABS.forEach(t=>{const el=document.getElementById('t-'+t);if(el)el.style.display=t===id?'block':'none';});
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  activeTab=id;
}

// ─── OPPORTUNITY ROW ─────────────────────────────────────────────────
function oppRow(o,idx){
  const s=scoreOf(o), sl=slOf(o), days=daysLeft(o.response_deadline);
  const sa=o.set_aside_type||o.set_aside||'';
  const src=o.source||'';
  return `<div class="opp" onclick="showDetail(${idx})" style="border-left:3px solid ${vtColor(o.vertical)}">
    <div>
      <div style="font-size:12px;font-weight:500;line-height:1.3">${o.title||'Untitled'}</div>
      <div style="font-size:10px;color:var(--t3);margin-top:3px;display:flex;gap:5px;align-items:center;flex-wrap:wrap">
        ${o.agency||'—'} · ${o.naics_code||''}
        ${sa?`<span class="badge" style="background:${sa==='SDB'?'var(--goldDim);color:var(--gold)':'var(--cyanDim);color:var(--cyan)'}">${sa}</span>`:''}
        ${src==='DIBBS'?'<span class="badge" style="background:var(--amberDim);color:var(--amber)">DIBBS</span>':''}
        ${o.state?`<span class="badge" style="background:var(--violetDim);color:var(--violet)">${o.state}</span>`:''}
      </div>
    </div>
    <div style="text-align:right;font-size:13px;font-weight:700">${fmt(o.estimated_value)}</div>
    <div style="text-align:center"><span style="font-size:18px;font-weight:800;color:${sc(s)}">${s||'—'}</span><span style="font-size:8px;color:var(--t3);letter-spacing:.1em;margin-left:3px">${sl}</span></div>
    <div style="text-align:center">${rb(o.recommendation||'BID')}</div>
    <div style="text-align:right;font-size:10px;color:${days!=null&&days<=10?'var(--red)':'var(--t3)'}">🕐 ${days!=null?days+'d':'—'}</div>
  </div>`;
}

// ─── DETAIL PANEL ────────────────────────────────────────────────────
function showDetail(idx){
  const o=OPPS[idx];
  if(!o)return;
  const s=scoreOf(o),sl=slOf(o),days=daysLeft(o.response_deadline);
  const matched=SUPS.filter(sp=>sp.opportunity_id===o.id||sp.notice_id===o.notice_id);
  const deadline=o.response_deadline?new Date(o.response_deadline).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}):'—';

  document.getElementById('det-content').innerHTML=`
    <div style="margin-bottom:4px">
      <span class="badge" style="background:${vtColor(o.vertical)}22;color:${vtColor(o.vertical)}">${vtLabel(o.vertical)}</span>
      ${o.source?`<span class="badge" style="background:var(--amberDim);color:var(--amber);margin-left:4px">${o.source}</span>`:''}
    </div>
    <div style="font-size:17px;font-weight:700;line-height:1.4;margin:10px 0 4px">${o.title||'Untitled'}</div>
    <div style="font-size:11px;color:var(--t2);margin-bottom:16px">${o.agency||'—'}</div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center;border:1px solid ${sc(s)}44">
        <div style="font-size:26px;font-weight:800;color:${sc(s)}">${s||'—'}</div>
        <div style="font-size:9px;color:var(--t3);text-transform:uppercase;margin-top:2px">${sl} Score</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--bd)">
        <div style="font-size:16px;font-weight:800;color:var(--gold)">${fmt(o.estimated_value)}</div>
        <div style="font-size:9px;color:var(--t3);text-transform:uppercase;margin-top:2px">Est. Value</div>
      </div>
      <div style="background:var(--card);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--bd)">
        <div style="font-size:16px;font-weight:800;color:${days!=null&&days<=10?'var(--red)':'var(--t1)'}">${days!=null?days+'d':'—'}</div>
        <div style="font-size:9px;color:var(--t3);text-transform:uppercase;margin-top:2px">Remaining</div>
      </div>
    </div>

    <div style="margin-bottom:14px">${rb(o.recommendation||'BID')}</div>

    <div style="background:var(--card);border-radius:8px;padding:14px;margin-bottom:12px;border:1px solid var(--bd)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:10px;line-height:1.8">

function buildStateMap(stateBase,oppsForVertical,vt){
  // inject live opp counts into state map
  const map={};
  stateBase.forEach(s=>{map[s.c]={...s,opps:0,v:0,s:0,jobs:[]};});
  oppsForVertical.forEach(o=>{
    const st=o.state;
    if(st&&map[st]){
      map[st].opps++;
      map[st].v+=(o.estimated_value||0);
      const sc2=scoreOf(o);
      if(sc2>map[st].s)map[st].s=sc2;
      map[st].jobs.push({t:o.title,v:fmt(o.estimated_value),s:sc2,sa:o.set_aside_type||'',cat:o.naics_code||''});
    }
  });
  return Object.values(map);
}

function renderGrid(el,states,vt){
  const regions=[...new Set(states.map(s=>s.r))];
  let h='';
  regions.forEach(rg=>{
    const rs=states.filter(s=>s.r===rg);
    if(!rs.length)return;
    h+='<div class="reg-lbl">'+rg+'</div><div class="sgrid">';
    rs.forEach(s=>{
      const cl=s.hot?'hot':s.opps===0?'dim':'';
      const co=s.opps>0?vtColor(vt):'var(--t3)';
      h+=`<div class="stile ${cl}" onclick="showStateDetail('${s.c}','${vt}',this)">${s.hot&&s.opps>0?'<div class="hpb" style="background:var(--greenDim);border:1px solid var(--greenBd);color:var(--green)">●</div>':''}
        <div style="font-size:11px;font-weight:900;color:${co}">${s.c}</div>
        <div style="font-size:8px;font-weight:700;color:${s.opps>0?sc(s.s):'var(--t3)'}">${s.opps>0?s.opps+' opp'+(s.opps>1?'s':''):'—'}</div>
        ${s.v>0?`<div style="font-size:7px;color:var(--t3)">${fmt(s.v)}</div>`:''}
      </div>`;
    });
    h+='</div>';
  });
  el.innerHTML=h;
}
